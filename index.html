<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Fonética - Português</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .ipa-btn {
            transition: all 0.2s;
        }
        .ipa-btn:hover {
            transform: translateY(-2px);
            background-color: #e2e8f0;
        }
        .feedback-enter {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #6366f1;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Ajuste para o teclado não ocupar espaço excessivo */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 6px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="app" class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-2xl">
        <!-- Cabeçalho -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Desafio Fonético</h1>
                <p class="text-xs text-gray-400">Teclado IPA Completo</p>
            </div>
            <div class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full font-semibold">
                Pontuação: <span id="score">0</span>
            </div>
        </div>

        <!-- Área da Palavra -->
        <div class="text-center mb-8 min-h-[100px] flex flex-col justify-center">
            <p class="text-gray-500 uppercase tracking-widest text-sm mb-1">Transcreva a palavra:</p>
            <div id="word-container" class="flex items-center justify-center gap-4">
                <h2 id="current-word" class="text-4xl font-black text-indigo-600 tracking-tight">Carregando...</h2>
            </div>
        </div>

        <!-- Input e Controles -->
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Sua Transcrição (IPA):</label>
                <div class="flex gap-2">
                    <input type="text" id="user-input" 
                        class="block w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 text-xl font-mono"
                        placeholder="Ex: [ˈka.za]"
                        autocomplete="off">
                    <button id="submit-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl font-bold transition-colors">
                        Verificar
                    </button>
                </div>
            </div>

            <!-- Teclado IPA Auxiliar -->
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                <div class="mb-4">
                    <p class="text-[10px] text-gray-400 mb-2 uppercase font-bold tracking-wider text-center">Vogais e Nasais</p>
                    <div id="keyboard-vowels" class="keyboard-grid"></div>
                </div>
                <div class="mb-4">
                    <p class="text-[10px] text-gray-400 mb-2 uppercase font-bold tracking-wider text-center">Consoantes</p>
                    <div id="keyboard-consonants" class="keyboard-grid"></div>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 mb-2 uppercase font-bold tracking-wider text-center">Especiais e Acentuação</p>
                    <div id="keyboard-special" class="keyboard-grid"></div>
                </div>
            </div>

            <!-- Feedback -->
            <div id="feedback-container" class="hidden rounded-xl p-4 text-center font-medium">
                <p id="feedback-text"></p>
                <p id="correct-answer" class="text-sm mt-1 opacity-80 font-mono"></p>
                
                <div class="flex justify-center gap-3 mt-4">
                    <button id="next-btn" class="bg-white text-gray-800 px-6 py-2 rounded-lg border border-gray-200 hover:bg-gray-50 transition-colors font-bold">
                        Próxima Palavra
                    </button>
                </div>
            </div>

            <!-- Botão de Pular -->
            <div id="skip-container" class="flex justify-center">
                <button id="skip-btn" class="text-sm text-gray-400 hover:text-gray-600 transition-colors flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 17 5-5-5-5M13 17l5-5-5-5"/></svg>
                    Pular palavra
                </button>
            </div>
        </div>

        <!-- Rodapé -->
        <div class="mt-8 pt-4 border-t border-gray-100 text-gray-400 text-[10px] flex justify-between items-center">
            <span>Dica: Use [ ] para delimitar a transcrição.</span>
            <span id="loading-status" class="hidden font-medium text-indigo-500"><span class="loader"></span> IA...</span>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'phonetic-pro-app';

        // Categorias de símbolos IPA
        const symbols = {
            vowels: ['a', 'e', 'ɛ', 'i', 'o', 'ɔ', 'u', 'ɐ', 'ə', 'ɐ̃', 'ẽ', 'ĩ', 'õ', 'ũ'],
            consonants: ['p', 'b', 't', 'd', 'k', 'g', 'f', 'v', 's', 'z', 'ʃ', 'ʒ', 'x', 'ʁ', 'h', 'm', 'n', 'ɲ', 'l', 'ʎ', 'ɾ', 'r'],
            special: ['ˈ', 'ˌ', '.', 'tʃ', 'dʒ', 'w', 'j', 'ks', 'ɡz', '[', ']', '/', '̃']
        };

        let score = 0;
        let currentWordData = null;
        let isWaitingForNext = false;

        const wordDisplay = document.getElementById('current-word');
        const userInput = document.getElementById('user-input');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const skipBtn = document.getElementById('skip-btn');
        const skipContainer = document.getElementById('skip-container');
        const scoreDisplay = document.getElementById('score');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackText = document.getElementById('feedback-text');
        const correctAnswerDisplay = document.getElementById('correct-answer');
        const loadingStatus = document.getElementById('loading-status');

        async function callGemini(prompt, systemPrompt = "") {
            loadingStatus.classList.remove('hidden');
            let retries = 0;
            const maxRetries = 5;
            
            while (retries < maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    loadingStatus.classList.add('hidden');
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    retries++;
                    await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                }
            }
            loadingStatus.classList.add('hidden');
            return null;
        }

        async function fetchNewWordFromAi() {
            wordDisplay.textContent = "...";
            wordDisplay.classList.add('opacity-50');
            skipBtn.disabled = true;
            
            const prompt = `Gere uma única palavra aleatória em português brasileiro e forneça sua transcrição fonética IPA correta, incluindo acento tônico (ˈ) e pontos de sílaba (.) se apropriado. 
            Responda APENAS em JSON: {"word": "palavra", "phonetic": "transcrição"}`;
            
            const system = "Você é um linguista especializado em Português Brasileiro. Retorne JSON.";
            const result = await callGemini(prompt, system);
            
            try {
                const cleanedJson = result.replace(/```json|```/g, '').trim();
                const data = JSON.parse(cleanedJson);
                currentWordData = data;
                renderWord();
            } catch (e) {
                currentWordData = { word: "Linguagem", phonetic: "lĩˈɡwaʒẽj" };
                renderWord();
            }
        }

        function renderWord() {
            wordDisplay.textContent = currentWordData.word;
            wordDisplay.classList.remove('opacity-50');
            userInput.value = '';
            userInput.disabled = false;
            submitBtn.disabled = false;
            isWaitingForNext = false;
            feedbackContainer.classList.add('hidden');
            skipContainer.classList.remove('hidden');
            skipBtn.disabled = false;
            userInput.focus();
        }

        function normalize(text) {
            return text.toLowerCase().replace(/[\[\]\/\s]/g, '');
        }

        function checkAnswer() {
            if (isWaitingForNext || userInput.value.trim() === "" || !currentWordData) return;

            const userVal = normalize(userInput.value);
            const correctVal = normalize(currentWordData.phonetic);

            isWaitingForNext = true;
            userInput.disabled = true;
            submitBtn.disabled = true;
            skipContainer.classList.add('hidden');

            feedbackContainer.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            feedbackContainer.classList.add('feedback-enter');

            if (userVal === correctVal) {
                score += 10;
                feedbackText.textContent = "✨ Excelente! Acertou em cheio.";
                feedbackContainer.classList.add('bg-green-100', 'text-green-700');
                correctAnswerDisplay.textContent = "";
            } else {
                feedbackText.textContent = "❌ Não foi dessa vez.";
                feedbackContainer.classList.add('bg-red-100', 'text-red-700');
                correctAnswerDisplay.textContent = `O correto seria: [${currentWordData.phonetic}]`;
            }

            scoreDisplay.textContent = score;
        }

        // Criar botões do teclado
        function createKeyboard(id, list) {
            const container = document.getElementById(id);
            list.forEach(symbol => {
                const btn = document.createElement('button');
                btn.textContent = symbol;
                btn.className = "ipa-btn bg-white border border-gray-200 py-2 rounded shadow-sm font-mono text-sm hover:bg-indigo-50 hover:border-indigo-200 text-gray-700";
                btn.onclick = () => {
                    if (!isWaitingForNext) {
                        const start = userInput.selectionStart;
                        const end = userInput.selectionEnd;
                        const text = userInput.value;
                        userInput.value = text.substring(0, start) + symbol + text.substring(end);
                        userInput.focus();
                        userInput.setSelectionRange(start + symbol.length, start + symbol.length);
                    }
                };
                container.appendChild(btn);
            });
        }

        // Inicialização
        createKeyboard('keyboard-vowels', symbols.vowels);
        createKeyboard('keyboard-consonants', symbols.consonants);
        createKeyboard('keyboard-special', symbols.special);

        submitBtn.onclick = checkAnswer;
        nextBtn.onclick = fetchNewWordFromAi;
        skipBtn.onclick = fetchNewWordFromAi;

        userInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                if (isWaitingForNext) fetchNewWordFromAi();
                else checkAnswer();
            }
        };

        window.onload = fetchNewWordFromAi;
    </script>
</body>
</html>
